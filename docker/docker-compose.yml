services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: proactiva
      POSTGRES_PASSWORD: proactiva
      POSTGRES_DB: proactiva
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proactiva -d proactiva"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://proactiva:proactiva@db:5432/proactiva
      PORT: "3100"
      SERVE_UI: "true"
      PROACTIVA_DEPLOYMENT_MODE: "authenticated"
      PROACTIVA_DEPLOYMENT_EXPOSURE: "private"
      PROACTIVA_PUBLIC_URL: "${PROACTIVA_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - proactiva-data:/proactiva
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  proactiva-data:
